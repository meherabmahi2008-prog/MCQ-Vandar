name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ১. প্রজেক্টের কোড নেওয়া
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ২. জাভা সেটআপ (JDK 17)
      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ৩. ফ্লাটার সেটআপ
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # ৪. ফ্লাটার ডিপেন্ডেন্সি ইন্সটল
      - name: Install Dependencies
        run: flutter pub get

      # ৫. অ্যান্ড্রেয়েড প্রজেক্ট জেনারেট করা
      - name: Re-create Android Platform
        run: flutter create . --platforms=android --org com.example.mcqvandar

      # 🌐 ৬. অ্যান্ড্রেয়েড পারমিশন সঠিকভাবে ফাইলটিতে অটো যুক্ত করা
      - name: Inject Internet Permission
        run: |
          python3 -c "
          path = 'android/app/src/main/AndroidManifest.xml'
          with open(path, 'r') as f:
              content = f.read()
          if 'android.permission.INTERNET' not in content:
              content = content.replace('<manifest xmlns:android=\"http://schemas.android.com/apk/res/android\">', '<manifest xmlns:android=\"http://schemas.android.com/apk/res/android\">\n    <uses-permission android:name=\"android.permission.INTERNET\"/>')
              with open(path, 'w') as f:
                  f.write(content)
          print('Permission Injected Successfully!')
          "

      # ৭. রিলেস APK তৈরি করা
      - name: Build APK
        run: flutter build apk --release

      # ৮. তৈরি হওয়া APK ডাউনলোডের জন্য আপলোড
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcq-vandar-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
