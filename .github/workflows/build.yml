name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ১. প্রজেক্টের কোড নেওয়া
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ২. জাভা সেটআপ (JDK 17)
      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ৩. ফ্লাটার সেটআপ
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # ৪. ফ্লাটার ডিপেন্ডেন্সি ইন্সটল
      - name: Install Dependencies
        run: flutter pub get

      # ৫. অ্যান্ড্রেয়েড প্রজেক্ট ফাইল জেনারেট করা
      - name: Re-create Android Files
        run: flutter create . --platforms=android

      # ৬. সরাসরি রিলেস APK তৈরি
      - name: Build APK
        run: flutter build apk --release

      # ৭. তৈরি হওয়া APK ডাউনলোডের জন্য আপলোড
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcq-vandar-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
