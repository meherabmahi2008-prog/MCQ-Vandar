name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ১. রিপোজিটরি থেকে কোড নেওয়া
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ২. জাভা পরিবেশ সেটআপ
      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ৩. ফ্লাটার পরিবেশ সেটআপ
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # ৪. অ্যান্ড্রেয়েড প্লাটফর্ম ফাইল তৈরি
      - name: Re-create Android Platform Files
        run: flutter create . --platforms=android

      # 🌐 ৫. অ্যান্ড্রেয়েড অ্যাপে ইন্টারনেট পারমিশন যুক্ত করা (ফিক্স)
      - name: Add Internet Permission to AndroidManifest
        run: |
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET"/>' android/app/src/main/AndroidManifest.xml

      # ৬. প্রজেক্টের প্যাকেজ ডাউনলোড
      - name: Install Dependencies
        run: flutter pub get

      # ৭. অ্যান্ড্রেয়েড APK তৈরি করা
      - name: Build APK
        run: flutter build apk --release

      # ৮. তৈরি হওয়া APK ডাউনলোডের জন্য আপলোড করা
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcq-vandar-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
